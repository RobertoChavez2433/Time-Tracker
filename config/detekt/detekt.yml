complexity:
  CognitiveComplexMethod:
    active: true
    threshold: 15
  ComplexInterface:
    active: true
    threshold: 10
  CyclomaticComplexMethod:
    active: true
    threshold: 12
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
  LargeClass:
    active: true
    threshold: 180
  LongMethod:
    active: true
    threshold: 90
  LongParameterList:
    active: true
    functionThreshold: 7
    constructorThreshold: 8
    ignoreDefaultParameters: true
    ignoreDataClasses: true
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInFiles: 18
    thresholdInClasses: 14
    thresholdInInterfaces: 10
    thresholdInObjects: 12
    thresholdInEnums: 10
    ignoreAnnotatedFunctions:
      - Composable

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable

performance:
  SpreadOperator:
    active: false

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludeImportStatements: true
  UnusedPrivateMember:
    active: true
