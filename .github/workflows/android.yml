name: Android

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Check LIMP policies
        shell: pwsh
        run: ./scripts/quality/check-limp-policies.ps1

      - name: Verify Android project
        run: ./gradlew spotlessCheck detekt testDebugUnitTest lintDebug assembleDebug --console=plain
